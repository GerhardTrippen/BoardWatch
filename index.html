<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #111210; --surface: #1c1d1a; --surface2: #262722;
      --border: #3a3b36; --border2: #4a4b44;
      --text: #e4e2d8; --text2: #908e82; --text3: #6a6860;

    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
    #root { max-width: 460px; margin: 0 auto; min-height: 100vh; padding: 12px 14px; }
    .hdr { display: flex; align-items: center; justify-content: space-between; padding: 10px 0 14px; border-bottom: 1px solid var(--border); margin-bottom: 14px; }

    .hdr-badge { font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 3px 7px; background: var(--surface2); border: 1px solid var(--border); border-radius: 3px; color: var(--text2); }
    .back { background: none; border: none; color: var(--text2); font-size: 18px; cursor: pointer; padding: 2px 6px; }

    .roles { display: flex; flex-direction: column; gap: 10px; padding-top: 48px; align-items: center; }
    .role-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 4px; font-family: 'JetBrains Mono', monospace; }
    .role-btn { width: 100%; max-width: 320px; padding: 18px 16px; border: 1px solid var(--border); background: var(--surface); border-radius: 6px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; text-align: left; }

    .sec-title { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
    .sec-divider { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--gold2); text-transform: uppercase; letter-spacing: 1px; padding: 6px 0 4px; margin-top: 8px; border-top: 1px solid var(--border); }
    .upload { border: 2px dashed var(--border); border-radius: 6px; padding: 28px; text-align: center; cursor: pointer; margin-bottom: 14px; }
    .upload:hover { border-color: var(--gold); background: var(--surface); }

    .clear-res:hover { border-color: var(--red); color: var(--red); }
    .conflict-banner { background: var(--red-bg); border: 1px solid var(--red); border-radius: 6px; padding: 10px 14px; margin-bottom: 10px; }
    .conflict-banner h3 { color: var(--red); font-size: 13px; margin-bottom: 3px; }

    .c-entry { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text); padding: 1px 0; }
    .resolve-btn { margin-top: 6px; margin-right: 4px; padding: 5px 10px; background: var(--red); border: none; border-radius: 3px; color: #fff; font-size: 11px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 600; }
    .export-btn { width: 100%; padding: 13px; background: var(--gold); border: none; border-radius: 6px; color: #111; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 10px; }
    .export-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .reset-btn { width: 100%; padding: 9px; background: none; border: 1px solid var(--red); border-radius: 6px; color: var(--red); font-size: 12px; cursor: pointer; margin-top: 6px; font-family: 'DM Sans', sans-serif; }
    .resume-btn { width: 100%; padding: 14px; border: 1px solid var(--border); background: var(--surface); border-radius: 6px; color: var(--text); font-size: 14px; font-weight: 600; cursor: pointer; text-align: left; font-family: 'DM Sans', sans-serif; }
    .resume-btn small { display: block; font-weight: 400; font-size: 11px; color: var(--text2); margin-top: 2px; }
    .toast { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); padding: 8px 18px; border-radius: 6px; font-size: 12px; font-weight: 600; z-index: 100; animation: sup .25s ease; white-space: nowrap; max-width: 90vw; }
    .toast.ok { background: var(--green); color: #fff; }
    .toast.err { background: var(--red); color: #fff; }
    .toast.info { background: var(--gold); color: #111; }
    @keyframes sup { from { transform: translateX(-50%) translateY(12px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: flex; align-items: center; justify-content: center; z-index: 50; padding: 16px; }
    .confirm { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; max-width: 300px; width: 100%; text-align: center; }
    .confirm h3 { margin-bottom: 6px; font-size: 15px; }
    .confirm p { color: var(--text2); font-size: 12px; margin-bottom: 14px; }
    .confirm-btns { display: flex; gap: 6px; }
    .confirm-btns button { flex: 1; padding: 9px; border-radius: 5px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; }
    .cancel-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
    .danger-btn { background: var(--red); border: none; color: #fff; }
    .t-info { font-size: 11px; color: var(--text3); margin-bottom: 12px; font-family: 'JetBrains Mono', monospace; line-height: 1.6; }
    .filter-bar { display: flex; gap: 4px; margin-bottom: 10px; flex-wrap: wrap; }
    .filter-btn { padding: 5px 10px; font-size: 10px; }
    .err-box { background: var(--red-bg); border: 1px solid var(--red); border-radius: 6px; padding: 12px; margin-bottom: 12px; font-size: 11px; color: var(--red); font-family: 'JetBrains Mono', monospace; word-break: break-all; }
    .conn-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
    .conn-dot.ok { background: var(--green); }
    .conn-dot.fail { background: var(--red); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-type="module">
    const { useState, useEffect, useCallback, useRef } = React;

    // ══════════════════════════════════════════════════════
    // CONFIG — edit these if needed
    // ══════════════════════════════════════════════════════
    const SUPA_URL = "https://gvwfroduvojfgjydwcsy.supabase.co";
    const SUPA_KEY = "sb_publishable_G64PCSaj10onsT-1qFG03w_JUyMXG9u";
    const FIXED_PIN = "1444";
    const POLL_MS = 2500;

    // ══════════════════════════════════════════════════════
    // SUPABASE REST HELPERS
    // ══════════════════════════════════════════════════════
    const HEADERS = {
      "apikey": SUPA_KEY,
      "Authorization": `Bearer ${SUPA_KEY}`,
      "Content-Type": "application/json",
      "Prefer": "return=representation",
    };

    async function supa(method, table, query = "", body = null) {
      const opts = { method, headers: { ...HEADERS } };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(`${SUPA_URL}/rest/v1/${table}${query}`, opts);
      if (!res.ok) {
        const text = await res.text();
        throw new Error(`${res.status}: ${text.slice(0, 200)}`);
      }
      const ct = res.headers.get("content-type") || "";
      if (ct.includes("json")) return res.json();
      return null;
    }

    const db = {
      async createTournament(t) {
        await supa("PATCH", "tournaments", "?is_active=eq.true", { is_active: false }).catch(() => {});
        const rows = await supa("POST", "tournaments", "", t);
        return rows?.[0];
      },
      async getActiveTournament() {
        const rows = await supa("GET", "tournaments", "?is_active=eq.true&order=created_at.desc&limit=1");
        return rows?.[0] || null;
      },
      async getTournamentByPin(pin) {
        const rows = await supa("GET", "tournaments", `?pin=eq.${encodeURIComponent(pin)}&is_active=eq.true&order=created_at.desc&limit=1`);
        return rows?.[0] || null;
      },
      async deleteTournament(id) {
        await supa("DELETE", "result_entries", `?board_id=in.(${await db.getBoardIds(id)})`).catch(() => {});
        await supa("DELETE", "boards", `?tournament_id=eq.${id}`).catch(() => {});
        await supa("DELETE", "tournaments", `?id=eq.${id}`);
      },
      async getBoardIds(tournamentId) {
        const boards = await supa("GET", "boards", `?tournament_id=eq.${tournamentId}&select=id`);
        return (boards || []).map(b => `'${b.id}'`).join(",");
      },
      async createBoards(boards) {
        return supa("POST", "boards", "", boards);
      },
      async getBoards(tournamentId) {
        return supa("GET", "boards", `?tournament_id=eq.${tournamentId}&order=board_number`);
      },
      async updateBoard(id, updates) {
        const rows = await supa("PATCH", "boards", `?id=eq.${id}`, updates);
        return rows?.[0];
      },
      async addResultEntry(entry) {
        return supa("POST", "result_entries", "", entry);
      },
      async getResultEntriesForBoards(boardIds) {
        if (!boardIds.length) return [];
        const ids = boardIds.map(id => `"${id}"`).join(",");
        return supa("GET", "result_entries", `?board_id=in.(${ids})&order=created_at`);
      },
      async clearResultEntries(boardId) {
        await supa("DELETE", "result_entries", `?board_id=eq.${boardId}`);
      },
      async getOriginalSJSON(tournamentId) {
        const rows = await supa("GET", "tournaments", `?id=eq.${tournamentId}&select=original_sjson`);
        return rows?.[0]?.original_sjson || null;
      },
    };

    // ══════════════════════════════════════════════════════
    // SJSON PARSER
    // ══════════════════════════════════════════════════════
    function parseSJSONFile(text) {
      const data = JSON.parse(text);
      if (!data.Sections || !data.Overview) throw new Error("Not a valid SwissSys SJSON file");
      const firstSec = data.Sections[0];
      const roundsPaired = firstSec["Rounds paired"] || 0;
      const roundsPlayed = firstSec["Rounds played"] || 0;
      const activeRound = roundsPaired > roundsPlayed ? roundsPaired : roundsPlayed;
      const roundIdx = activeRound - 1;
      const allBoards = [];
      for (const section of data.Sections) {
        const boardMap = {};
        for (const player of section.Players || []) {
          const results = player.Results || [];
          if (!results[roundIdx]) continue;
          const parts = results[roundIdx].split(";");
          if (parts.length < 4) continue;
          const rc = parts[0], opp = parseInt(parts[1]) || 0;
          const color = parts[2], board = parseInt(parts[3]) || 0;
          if (board <= 0 || opp <= 0 || rc === "B" || rc === "U") continue;
          const side = color === "W" ? "white" : "black";
          if (!boardMap[board]) boardMap[board] = { section: section["Section name"] };
          boardMap[board][side] = { name: player.Name, pairNum: player["Pair number"], id: player.ID, rating: player.Rating || 0, rc };
        }
        for (const [bn, info] of Object.entries(boardMap)) {
          if (info.white && info.black) {
            let ex = null;
            const w = info.white.rc, b = info.black.rc;
            if (w === "+" && b === "-") ex = "1-0";
            else if (w === "-" && b === "+") ex = "0-1";
            else if (w === "=" && b === "=") ex = "½-½";
            else if (w === "X" && b === "F") ex = "1-0F";
            else if (w === "F" && b === "X") ex = "0-1F";
            allBoards.push({
              board_number: parseInt(bn), section: info.section,
              white_name: info.white.name, white_pair_num: info.white.pairNum,
              white_id: info.white.id, white_rating: info.white.rating,
              black_name: info.black.name, black_pair_num: info.black.pairNum,
              black_id: info.black.id, black_rating: info.black.rating,
              white_illegal_moves: 0, black_illegal_moves: 0, result: ex,
            });
          }
        }
      }
      allBoards.sort((a, b) => a.board_number - b.board_number);
      return {
        name: data.Overview["Tournament title"] || "Tournament",
        timeControl: data.Overview["Tournament time controls"] || "",
        activeRound, totalRounds: firstSec["Final round"] || 6,
        boards: allBoards,
        sections: data.Sections.map(s => s["Section name"]),
      };
    }

    function buildExportSJSON(origText, boards, activeRound) {
      const data = JSON.parse(origText);
      const roundIdx = activeRound - 1;
      const rmap = {};
      for (const b of boards) { if (b.result) rmap[b.board_number] = b; }
      for (const sec of data.Sections) {
        for (const pl of sec.Players || []) {
          const res = pl.Results || [];
          if (!res[roundIdx]) continue;
          const p = res[roundIdx].split(";");
          if (p.length < 4) continue;
          const brd = parseInt(p[3]) || 0, clr = p[2];
          if (brd <= 0) continue;
          const bd = rmap[brd];
          if (!bd || !bd.result) continue;
          let c;
          const r = bd.result;
          if (r === "1-0") c = clr === "W" ? "+" : "-";
          else if (r === "0-1") c = clr === "W" ? "-" : "+";
          else if (r === "½-½") c = "=";
          else if (r === "1-0F") c = clr === "W" ? "X" : "F";
          else if (r === "0-1F") c = clr === "W" ? "F" : "X";
          if (c) { p[0] = c; pl.Results[roundIdx] = p.join(";"); }
        }
      }
      return JSON.stringify(data, null, 2);
    }

    // ══════════════════════════════════════════════════════
    // HELPERS
    // ══════════════════════════════════════════════════════
    function resClass(r) {
      if (!r) return "";
      if (r === "1-0") return "rw"; if (r === "0-1") return "rb";
      if (r === "½-½") return "rd"; return "rf";
    }
    function resLabel(r) {
      if (r === "1-0F") return "1-0 F"; if (r === "0-1F") return "0-1 F"; return r;
    }

    // ══════════════════════════════════════════════════════
    // MAIN APP
    // ══════════════════════════════════════════════════════
    function BoardWatch() {
      const [screen, setScreen] = useState("role");
      const [role, setRole] = useState(null);
      const [meta, setMeta] = useState(null);
      const [boards, setBoards] = useState([]);
      const [entries, setEntries] = useState({});
      const [pinInput, setPinInput] = useState("");
      const [arbName, setArbName] = useState("");
      const [selBoard, setSelBoard] = useState(null);
      const [toast, setToast] = useState(null);
      const [dlg, setDlg] = useState(null);
      const [secFilter, setSecFilter] = useState("all");
      const [loading, setLoading] = useState(false);
      const [dbErr, setDbErr] = useState(null);
      const fileRef = useRef();

      const flash = (msg, type = "info") => { setToast({ msg, type }); setTimeout(() => setToast(null), 2200); };

      // ── Poll boards ──
      const refresh = useCallback(async () => {
        if (!meta) return;
        try {
          const b = await db.getBoards(meta.id);
          setBoards(b || []);
          const ids = (b || []).map(x => x.id);
          const re = await db.getResultEntriesForBoards(ids).catch(() => []);
          const g = {};
          for (const e of (re || [])) { if (!g[e.board_id]) g[e.board_id] = []; g[e.board_id].push(e); }
          setEntries(g);
          setDbErr(null);
        } catch (err) { setDbErr(err.message); }
      }, [meta]);

      useEffect(() => {
        if (!meta) return;
        refresh();
        const id = setInterval(refresh, POLL_MS);
        return () => clearInterval(id);
      }, [meta, refresh]);

      // Check for existing tournament on mount
      useEffect(() => {
        db.getActiveTournament().then(t => { if (t) setMeta(t); }).catch(() => {});
      }, []);

      // ── TD Upload ──
      const handleUpload = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        setLoading(true);
        try {
          const text = await file.text();
          const parsed = parseSJSONFile(text);
          const t = await db.createTournament({
            name: parsed.name, pin: FIXED_PIN, active_round: parsed.activeRound,
            total_rounds: parsed.totalRounds, time_control: parsed.timeControl,
            sections: parsed.sections, file_name: file.name, original_sjson: text,
          });
          const rows = parsed.boards.map(b => ({ tournament_id: t.id, ...b }));
          await db.createBoards(rows);
          setMeta(t);
          setScreen("td-dashboard");
          flash(`${parsed.boards.length} boards → database`, "ok");
        } catch (err) { flash("Error: " + err.message, "err"); setDbErr(err.message); }
        setLoading(false);
      };

      // ── Export ──
      const handleExport = async () => {
        if (!meta) return;
        try {
          const orig = await db.getOriginalSJSON(meta.id);
          if (!orig) { flash("Original SJSON missing", "err"); return; }
          const exp = buildExportSJSON(orig, boards, meta.active_round);
          const blob = new Blob([exp], { type: "application/json" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a"); a.href = url;
          a.download = meta.file_name || "results.sjson"; a.click();
          URL.revokeObjectURL(url);
          flash("SJSON exported!", "ok");
        } catch (err) { flash("Export error: " + err.message, "err"); }
      };

      // ── Reset ──
      const handleReset = async () => {
        if (!meta) return;
        try {
          await db.deleteTournament(meta.id);
          setMeta(null); setBoards([]); setEntries({});
          setScreen("td-setup"); setDlg(null); flash("Round cleared", "info");
        } catch (err) { flash("Error: " + err.message, "err"); }
      };

      // ── Arbiter Join ──
      const handleJoin = async () => {
        setLoading(true);
        try {
          const t = await db.getTournamentByPin(pinInput);
          if (!t) { flash("Wrong PIN or no active round", "err"); setLoading(false); return; }
          setMeta(t); setScreen("arbiter-boards"); flash("Connected!", "ok");
        } catch (err) { flash("Connection error", "err"); }
        setLoading(false);
      };

      // ── Illegal moves ──
      const addIll = async (b, color) => {
        const f = color === "white" ? "white_illegal_moves" : "black_illegal_moves";
        await db.updateBoard(b.id, { [f]: (b[f] || 0) + 1 }); refresh();
      };
      const undoIll = async (b, color) => {
        const f = color === "white" ? "white_illegal_moves" : "black_illegal_moves";
        if (b[f] > 0) { await db.updateBoard(b.id, { [f]: b[f] - 1 }); refresh(); }
      };

      // ── Result ──
      const enterRes = async (b, result) => {
        const arb = arbName || "Arbiter";
        try {
          await db.addResultEntry({ board_id: b.id, arbiter: arb, result });
          await db.updateBoard(b.id, { result });
          await refresh();
          const ent = entries[b.id] || [];
          const uniq = [...new Set([...ent.map(e => e.result), result])];
          if (uniq.length > 1) flash("⚠ CONFLICT!", "err");
          else flash(`Board ${b.board_number}: ${resLabel(result)}`, "ok");
        } catch (err) { flash("Error: " + err.message, "err"); }
      };
      const clearRes = async (b) => {
        try {
          await db.clearResultEntries(b.id);
          await db.updateBoard(b.id, { result: null });
          await refresh(); flash("Result cleared", "info");
        } catch (err) { flash("Error: " + err.message, "err"); }
      };
      const resolveConf = async (b, result) => {
        try {
          await db.clearResultEntries(b.id);
          await db.addResultEntry({ board_id: b.id, arbiter: "TD", result });
          await db.updateBoard(b.id, { result });
          await refresh(); flash(`Board ${b.board_number} resolved`, "ok");
        } catch (err) { flash("Error: " + err.message, "err"); }
      };

      // ── Derived ──
      const conflicts = boards.map(b => {
        const e = entries[b.id] || [];
        const u = [...new Set(e.map(x => x.result))];
        return u.length > 1 ? { board: b, entries: e, uniq: u } : null;
      }).filter(Boolean);

      const stats = { total: boards.length, done: boards.filter(b => b.result).length, conflicts: conflicts.length };
      const sections = meta?.sections || [];
      const filtered = secFilter === "all" ? boards : boards.filter(b => b.section === secFilter);
      const grouped = [];
      let lastSec = null;
      for (const b of filtered) {
        if (b.section !== lastSec) { grouped.push({ t: "h", section: b.section }); lastSec = b.section; }
        grouped.push({ t: "b", board: b });
      }

      const nav = (s) => { setScreen(s); setSelBoard(null); };

      const BoardRow = ({ b, showConf }) => {
        const isC = showConf && conflicts.some(c => c.board.id === b.id);
        return (
          <div className={`board-row ${b.result ? "done" : ""} ${isC ? "conflict" : ""}`}
            onClick={() => { setSelBoard(b); setScreen("board-detail"); }}>
            <div className="brd-n">{b.board_number}</div>
            <div className="brd-players">
              <div className="brd-p w">{b.white_name}</div>
              <div className="brd-p bk">{b.black_name}</div>
            </div>
            <div className="brd-meta">
              {(b.white_illegal_moves > 0 || b.black_illegal_moves > 0) && (
                <span className="ill-badge">
                  {b.white_illegal_moves > 0 && `□${b.white_illegal_moves}`}
                  {b.white_illegal_moves > 0 && b.black_illegal_moves > 0 && " "}
                  {b.black_illegal_moves > 0 && `■${b.black_illegal_moves}`}
                </span>
              )}
              {b.result && <span className={`res-badge ${resClass(b.result)}`}>{resLabel(b.result)}</span>}
              {isC && <span className="conflict-icon">⚠</span>}
            </div>
          </div>
        );
      };

      const Filters = () => sections.length > 1 && (
        <div className="filter-bar">
          <button className={`res-btn filter-btn ${secFilter === "all" ? "active" : ""}`} onClick={() => setSecFilter("all")}>All</button>
          {sections.map(s => (
            <button key={s} className={`res-btn filter-btn ${secFilter === s ? "active" : ""}`}
              onClick={() => setSecFilter(s)}>{s.replace(" Section", "")}</button>
          ))}
        </div>
      );

      return (
        <div>
          {/* Header */}
          <div className="hdr">
            <div className="hdr-left">
              {screen !== "role" && <button className="back" onClick={() => {
                if (screen === "board-detail") nav(role === "td" ? "td-dashboard" : "arbiter-boards");
                else { setScreen("role"); setRole(null); }
              }}>←</button>}
              <div className="logo"><b>Board</b><span>Watch</span></div>
            </div>
            <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
              {meta && <div className="hdr-badge">R{meta.active_round}/{meta.total_rounds}</div>}
              <span className={`conn-dot ${dbErr ? "fail" : "ok"}`} title={dbErr || "Connected"} />
            </div>
          </div>

          {toast && <div className={`toast ${toast.type}`}>{toast.msg}</div>}
          {dlg && (
            <div className="overlay" onClick={() => setDlg(null)}>
              <div className="confirm" onClick={e => e.stopPropagation()}>
                <h3>{dlg.title}</h3><p>{dlg.msg}</p>
                <div className="confirm-btns">
                  <button className="cancel-btn" onClick={() => setDlg(null)}>Cancel</button>
                  <button className="danger-btn" onClick={() => { dlg.fn(); setDlg(null); }}>{dlg.ok}</button>
                </div>
              </div>
            </div>
          )}
          {dbErr && screen !== "role" && <div className="err-box">{dbErr}</div>}

          {/* Role Select */}
          {screen === "role" && (
            <div className="roles">
              <div className="role-label">Select role</div>
              <button className="role-btn" onClick={() => { setRole("td"); setScreen(meta ? "td-dashboard" : "td-setup"); }}>
                Tournament Director<small>Upload pairings · manage round · export</small>
              </button>
              <button className="role-btn" onClick={() => { setRole("arbiter"); setScreen("arbiter-join"); }}>
                Arbiter<small>Record illegal moves &amp; results</small>
              </button>
            </div>
          )}

          {/* TD Setup */}
          {screen === "td-setup" && (
            <div>
              <div className="sec-title">Upload SJSON</div>
              <div className="upload" onClick={() => fileRef.current?.click()}>
                <p>{loading ? "Uploading..." : "Tap to upload .sjson file"}</p>
                <input ref={fileRef} type="file" accept=".sjson,.json" onChange={handleUpload} />
              </div>
              {meta && <button className="resume-btn" onClick={() => setScreen("td-dashboard")}>
                Resume: {meta.name}<small>Round {meta.active_round} · {stats.done}/{stats.total} done</small>
              </button>}
            </div>
          )}

          {/* TD Dashboard */}
          {screen === "td-dashboard" && meta && (
            <div>
              <div className="t-info">{meta.name}<br/>Round {meta.active_round} · {meta.time_control}</div>
              <div className="pin-box"><div className="pin-code">{meta.pin}</div><div className="pin-hint">Share PIN with arbiters</div></div>
              <div className="stats">
                <div className="stat"><div className="stat-v">{stats.total}</div><div className="stat-l">Boards</div></div>
                <div className="stat"><div className="stat-v">{stats.done}</div><div className="stat-l">Done</div></div>
                <div className="stat"><div className={`stat-v ${stats.conflicts > 0 ? "alert" : ""}`}>{stats.conflicts}</div><div className="stat-l">Conflicts</div></div>
              </div>
              <Filters />
              {conflicts.map(c => (
                <div key={c.board.id} className="conflict-banner">
                  <h3>⚠ Board {c.board.board_number}</h3>
                  <p>{c.board.white_name} vs {c.board.black_name}</p>
                  <div>{c.entries.map((e, i) => <div key={i} className="c-entry">{e.arbiter}: {resLabel(e.result)}</div>)}</div>
                  <div style={{ display: "flex", gap: 4, flexWrap: "wrap", marginTop: 4 }}>
                    {c.uniq.map(r => <button key={r} className="resolve-btn" onClick={() => resolveConf(c.board, r)}>Accept {resLabel(r)}</button>)}
                  </div>
                </div>
              ))}
              <div className="boards">
                {grouped.map((item, i) => item.t === "h"
                  ? <div key={`h-${i}`} className="sec-divider">{item.section}</div>
                  : <BoardRow key={item.board.id} b={item.board} showConf={true} />
                )}
              </div>
              <button className="export-btn" onClick={handleExport} disabled={stats.conflicts > 0}>Export SJSON ({stats.done}/{stats.total})</button>
              {stats.conflicts > 0 && <p style={{ fontSize: 10, color: "var(--red)", textAlign: "center", marginTop: 3 }}>Resolve conflicts first</p>}
              <button className="reset-btn" onClick={() => setDlg({ title: "Clear Round?", msg: "Deletes all data for this round.", ok: "Clear", fn: handleReset })}>Clear Round</button>
            </div>
          )}

          {/* Arbiter Join */}
          {screen === "arbiter-join" && (
            <div>
              <div className="sec-title">Tournament PIN</div>
              <div className="pin-row">
                <input className="pin-input" type="text" inputMode="numeric" maxLength={4}
                  placeholder="PIN" value={pinInput} onChange={e => setPinInput(e.target.value.replace(/\D/g, "").slice(0, 4))} />
                <button className="join-btn" onClick={handleJoin} disabled={pinInput.length < 4 || loading}>{loading ? "..." : "Join"}</button>
              </div>
              <input className="name-input" type="text" placeholder="Your name (optional)"
                value={arbName} onChange={e => setArbName(e.target.value)} />
            </div>
          )}

          {/* Arbiter Boards */}
          {screen === "arbiter-boards" && meta && (
            <div>
              <div className="t-info">{meta.name} · Round {meta.active_round}</div>
              <div className="stats"><div className="stat"><div className="stat-v">{stats.done}/{stats.total}</div><div className="stat-l">Complete</div></div></div>
              <Filters />
              <div className="boards">
                {grouped.map((item, i) => item.t === "h"
                  ? <div key={`h-${i}`} className="sec-divider">{item.section}</div>
                  : <BoardRow key={item.board.id} b={item.board} showConf={false} />
                )}
              </div>
            </div>
          )}

          {/* Board Detail */}
          {screen === "board-detail" && selBoard && (() => {
            const b = boards.find(x => x.id === selBoard.id) || selBoard;
            const isC = conflicts.some(c => c.board.id === b.id);
            const ent = entries[b.id] || [];
            return (
              <div>
                <div className="detail">
                  <div className="detail-hdr">
                    <div><div className="detail-title">Board {b.board_number}</div><div className="detail-section">{b.section}</div></div>
                    {b.result && <span className={`res-badge ${resClass(b.result)}`}>{resLabel(b.result)}</span>}
                  </div>
                  <div className="player-row">
                    <div className="pl-info"><div className="pl-color">□ White</div><div className="pl-name">{b.white_name}</div><div className="pl-rating">{b.white_rating}</div></div>
                    <div className="ill-ctrl">
                      <button className="undo" disabled={!b.white_illegal_moves} onClick={() => undoIll(b, "white")}>−</button>
                      <div className="ill-count">{b.white_illegal_moves || 0}</div>
                      <button className="ill-btn" onClick={() => addIll(b, "white")}>+Illegal</button>
                    </div>
                  </div>
                  <div className="player-row">
                    <div className="pl-info"><div className="pl-color">■ Black</div><div className="pl-name">{b.black_name}</div><div className="pl-rating">{b.black_rating}</div></div>
                    <div className="ill-ctrl">
                      <button className="undo" disabled={!b.black_illegal_moves} onClick={() => undoIll(b, "black")}>−</button>
                      <div className="ill-count">{b.black_illegal_moves || 0}</div>
                      <button className="ill-btn" onClick={() => addIll(b, "black")}>+Illegal</button>
                    </div>
                  </div>
                </div>
                <div className="sec-title">Game Result</div>
                <div className="result-grid">
                  {["1-0", "½-½", "0-1"].map(r => (
                    <button key={r} className={`res-btn ${b.result === r ? "active" : ""}`} onClick={() => enterRes(b, r)}>{r}</button>
                  ))}
                </div>
                <div className="result-grid2">
                  {[["1-0F","1-0 Forfeit"],["0-1F","0-1 Forfeit"]].map(([v,l]) => (
                    <button key={v} className={`res-btn ${b.result === v ? "active" : ""}`} onClick={() => enterRes(b, v)}>{l}</button>
                  ))}
                </div>
                {b.result && role === "td" && <button className="clear-res" onClick={() => clearRes(b)}>Clear result</button>}
                {isC && <div className="conflict-banner" style={{marginTop:10}}>
                  <h3>⚠ Conflicting Results</h3>
                  {ent.map((e,i) => <div key={i} className="c-entry">{e.arbiter}: {resLabel(e.result)}</div>)}
                </div>}
              </div>
            );
          })()}
        </div>
      );
    }

    // Mount
    ReactDOM.createRoot(document.getElementById("root")).render(<BoardWatch />);
  </script>
</body>
</html>
